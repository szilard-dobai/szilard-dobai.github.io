<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#4F46E5"/>

  <!-- Phone frame (tilted slightly) -->
  <g transform="translate(256,256) rotate(-8) translate(-256,-256)">
    <!-- Phone body -->
    <rect x="148" y="88" width="216" height="336" rx="28" fill="#1E1B4B" stroke="#312E81" stroke-width="4"/>

    <!-- Screen area -->
    <rect x="160" y="108" width="192" height="296" rx="16" fill="#EEF2FF"/>

    <!-- Screenshot content - abstract representation -->
    <!-- Header bar -->
    <rect x="160" y="108" width="192" height="32" rx="16" fill="#6366F1"/>

    <!-- Content blocks -->
    <rect x="176" y="156" width="80" height="8" rx="4" fill="#A5B4FC"/>
    <rect x="176" y="172" width="120" height="8" rx="4" fill="#C7D2FE"/>
    <rect x="176" y="188" width="100" height="8" rx="4" fill="#C7D2FE"/>

    <!-- Image placeholder -->
    <rect x="176" y="212" width="160" height="90" rx="8" fill="#A5B4FC"/>
    <!-- Mountain icon inside image -->
    <path d="M200 282 L230 252 L250 272 L270 242 L312 282Z" fill="#6366F1" opacity="0.6"/>
    <!-- Sun -->
    <circle cx="296" cy="232" r="12" fill="#6366F1" opacity="0.4"/>

    <!-- More content lines -->
    <rect x="176" y="318" width="110" height="8" rx="4" fill="#C7D2FE"/>
    <rect x="176" y="334" width="140" height="8" rx="4" fill="#C7D2FE"/>
    <rect x="176" y="350" width="90" height="8" rx="4" fill="#C7D2FE"/>

    <!-- Home indicator -->
    <rect x="222" y="390" width="68" height="5" rx="2.5" fill="#312E81"/>
  </g>

  <!-- Cursor / placement indicator -->
  <g transform="translate(340, 340)">
    <path d="M0 0 L24 20 L10 20 L16 36 L8 38 L2 22 L-8 32Z" fill="white" stroke="#1E1B4B" stroke-width="2" stroke-linejoin="round"/>
  </g>
</svg>
